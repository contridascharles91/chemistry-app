<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#667eea"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="orb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nucleusGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Orbital ring 1 — horizontal (0°) -->
  <ellipse cx="50" cy="50" rx="40" ry="14"
           fill="none" stroke="url(#orb1)" stroke-width="5.5"
           filter="url(#glow)" opacity="0.92"/>

  <!-- Orbital ring 2 — 60° -->
  <ellipse cx="50" cy="50" rx="40" ry="14"
           fill="none" stroke="url(#orb2)" stroke-width="5.5"
           transform="rotate(60 50 50)"
           filter="url(#glow)" opacity="0.88"/>

  <!-- Orbital ring 3 — 120° -->
  <ellipse cx="50" cy="50" rx="40" ry="14"
           fill="none" stroke="url(#orb1)" stroke-width="5.5"
           transform="rotate(120 50 50)"
           filter="url(#glow)" opacity="0.85"/>

  <!-- Nucleus glow halo -->
  <circle cx="50" cy="50" r="10" fill="#a855f7" opacity="0.25" filter="url(#nucleusGlow)"/>

  <!-- Nucleus -->
  <circle cx="50" cy="50" r="7" fill="#dcc8ff"/>
</svg>